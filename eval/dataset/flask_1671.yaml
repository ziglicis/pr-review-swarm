title: Add support for serializing top-level arrays to JSON
pre_merge_sha: daceb3e3a028b4b408c4bbdbdef0047f1de3a7c9
changed_lines: 231
selected_because: >
  jsonify behavior change with a classic bare-except catch and dead-check
  cleanup in review; docs-heavy tail ignored.
ground_truth:
  - id: g1
    issue: >
      A bare "except:" clause is almost never appropriate — it swallows
      SystemExit and KeyboardInterrupt; the exception type must be
      constrained.
    evidence: https://github.com/pallets/flask/pull/1671#discussion_r48600047
    category: correctness
  - id: g2
    issue: >
      Pointless type checks: kwargs is always a dict and args is always a
      tuple in that code path, so the isinstance guards are dead weight.
    evidence: https://github.com/pallets/flask/pull/1671#discussion_r50705953
    category: style
  - id: g3
    issue: >
      The behavior change needs a proper versionchanged directive in the
      docstring rather than prose.
    evidence: https://github.com/pallets/flask/pull/1671#discussion_r48702251
    category: style
