url: https://github.com/psf/requests/pull/3984
repo: psf/requests
pr: 3984
title: Fix the additional newline generated by iter_lines() caused by a CRLF pair split across chunks
pre_merge_sha: 458df8f4f432956003a81a5285129e6dbf9b40b0
# reviewed SHA: commit where the most ground-truth issues are simultaneously
# present (the pre-fix state reviewers most engaged with). Verified by code
# inspection during judging; GT not present here is marked non-matchable.
review_sha: f555edd50be304793a839ef26676c52e81b2dcbf
changed_lines: 125
selected_because: >
  Chunk-boundary parsing fix where review found two genuine edge-case bugs
  in the proposed patch itself.
ground_truth:
  - id: g1
    issue: >
      If the body ends with a CRLF split at a chunk boundary, the chunk
      becomes empty after stripping, splitlines() returns [], and lines[-1]
      raises IndexError.
    evidence: https://github.com/psf/requests/pull/3984#discussion_r112750569
    category: correctness
  - id: g2
    issue: >
      Chunks like ['...\r', '\n', '\nmore'] strip two newline characters
      instead of emitting the empty line — the CR flag must be reset after
      consuming one LF.
    evidence: https://github.com/psf/requests/pull/3984#discussion_r112929801
    category: correctness
  - id: g3
    issue: >
      New tests use unprefixed string literals that are intended to be
      unicode; they must carry the u'' prefix to pass on Python 2.
    evidence: https://github.com/psf/requests/pull/3984#discussion_r112804923
    category: test
  - id: g4
    issue: >
      The chunk/flag handling should be restructured for readability (named
      condition variables, single assignment site) rather than the doubled-up
      inline conditions.
    evidence: https://github.com/psf/requests/pull/3984#discussion_r113172022
    category: style
