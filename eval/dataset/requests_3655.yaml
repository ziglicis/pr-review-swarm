url: https://github.com/psf/requests/pull/3655
repo: psf/requests
pr: 3655
title: Rewind readable body before POST redirect
pre_merge_sha: 522d37c9597882db3fbd5fb08804b27b5fd8be4d
changed_lines: 174
selected_because: >
  Body-rewind bugfix with review catching a sentinel-value gap, a Python 2
  numeric-type bug, and API-naming/test-coverage feedback.
ground_truth:
  - id: g1
    issue: >
      When tell() fails at prepare time, _body_position stays None and
      rewind_body silently skips instead of raising; a sentinel object is
      needed to distinguish "never set" from "tell failed".
    evidence: https://github.com/psf/requests/pull/3655#discussion_r85648021
    category: correctness
  - id: g2
    issue: >
      Casting tell()'s result with int() is wrong on Python 2 where long
      (bignum) is meaningful; an integer_types tuple belongs in compat.py —
      and the first attempt wrote (int) which isn't a tuple at all.
    evidence: https://github.com/psf/requests/pull/3655#discussion_r85892421
    category: correctness
  - id: g3
    issue: >
      The new exception name RedirectError is too vague for what it signals;
      it should be the specific UnrewindableBodyError.
    evidence: https://github.com/psf/requests/pull/3655#discussion_r85712220
    category: style
  - id: g4
    issue: >
      Tests must assert the actual content re-read after rewind and cover an
      object with seek() but a broken/missing tell().
    evidence: https://github.com/psf/requests/pull/3655#discussion_r85716594
    category: test
  - id: g5
    issue: >
      The rewind helper doesn't use self — it's a function masquerading as a
      method and belongs in utils.
    evidence: https://github.com/psf/requests/pull/3655#discussion_r85892494
    category: style
