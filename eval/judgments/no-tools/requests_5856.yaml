case: requests_5856
experiment: no-tools
ground_truth_matches:
- ground_truth: g1
  issue: 'The Python 2 json path is broken: json.JSONDecodeError doesn''t exist on Python 2, so the
    except-clause handling falls over with an AttributeError (caught via failing CI during review).'
  matched_finding: 2
  note: 'PRESENT at review_sha: models.py:917 `except json.JSONDecodeError` fails on py2 where the
    attr doesn''t exist (discussion_r667104578, CI-caught)'
  matchable: true
- ground_truth: g2
  issue: 'The new JSONDecodeError must fit the exception hierarchy: subclass the catch-all RequestException
    (so users can catch everything requests throws) and preserve/proxy the original underlying exception''s
    info.'
  matched_finding: 1
  note: 'PRESENT: `class JSONDecodeError(StandardJSONDecodeError, SimpleJSONDecodeError)` does not
    subclass RequestException (discussion_r667095839)'
  matchable: true
- ground_truth: g3
  issue: Unrelated changes bundled into the PR (formatting/spacing tweaks, doc edits) that reviewers
    repeatedly asked to revert as scope creep.
  matched_finding: null
  note: 'PRESENT: sigmavirus24 left 11 ''Please revert this'' comments on tangential formatting (models.py
    180/187/231/315/391/446/509/785/843/957/961); no experiment flagged the changes as out-of-scope'
  matchable: true
- ground_truth: g4
  issue: The simplejson/json resolution logic is duplicated across several files; JSONDecodeError
    should be resolved once in compat.py and imported from there.
  matched_finding: null
  note: 'NON-matchable: the ''consolidate JSON-type resolution in compat.py'' concern (discussion_r671444604)
    was raised against later commit 64b3f189; at 0045b835 the logic lives only in exceptions.py,
    no cross-file duplication yet'
  matchable: false
finding_validity:
- finding: 0
  title: Renaming `complexjson` import to `json` causes name collision, breaking json.dumps() at
    runtime
  valid: true
  note: '`from .compat import json` collides with json= param, breaks json.dumps at runtime'
- finding: 1
  title: JSONDecodeError does not inherit from RequestException, breaking the stated catch invariant
  valid: true
  note: 'g2: no RequestException in the MRO'
- finding: 2
  title: except json.JSONDecodeError fails on Python 2 where json.JSONDecodeError does not exist
  valid: true
  note: 'g1: py2 json.JSONDecodeError catch'
- finding: 3
  title: Unconditional import of simplejson causes ImportError in environments without simplejson
    installed
  valid: true
  note: unconditional simplejson import
- finding: 4
  title: Tests make live network requests instead of mocked responses, making them unreliable and
    environment-dependent
  valid: true
  note: live network tests
- finding: 5
  title: JSON decode errors from the UTF-detected encoding path are not wrapped and propagate as
    raw json.JSONDecodeError
  valid: true
  note: UTF-detected path not wrapped
- finding: 6
  title: SimpleJSONDecodeError falls back to bare Exception, causing unexpected MRO and over-broad
    inheritance
  valid: true
  note: SimpleJSONDecodeError=Exception broadens MRO
- finding: 7
  title: No tests cover the Python 2 or simplejson-absent fallback paths in the exception hierarchy
  valid: true
  note: 'coverage gap: py2/simplejson-absent fallback untested'
- finding: 8
  title: JSONDecodeError MRO on Python 2 without simplejson is degenerate and unexpected
  valid: true
  note: py2-without-simplejson MRO is genuinely degenerate ((ValueError, Exception))
- finding: 9
  title: JSONDecodeError raised without exception chaining, discarding the original traceback
  valid: uncertain
  note: no raise-from — but py2 forbids raise-from syntactically; mild
- finding: 10
  title: No test verifies JSONDecodeError is importable from the top-level requests namespace
  valid: true
  note: 'factual coverage gap: top-level importability untested'
- finding: 11
  title: JSONDecodeError docstring style inconsistent with surrounding exceptions
  valid: true
  note: docstring inconsistency real
- finding: 12
  title: Intermediate alias names StandardJSONDecodeError / SimpleJSONDecodeError leak into the public
    module namespace
  valid: uncertain
  note: alias leak subjective
- finding: 13
  title: 'Import ordering: new import breaks existing alphabetical/grouping convention'
  valid: uncertain
  note: import-ordering nit subjective
- finding: 14
  title: Test URLs are magic strings and inline comments don't align with project conventions
  valid: uncertain
  note: magic test URLs — subjective nit
