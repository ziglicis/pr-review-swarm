case: httpx_2278
experiment: no-tools
ground_truth_matches:
- ground_truth: g1
  issue: When the user supplies a Content-Type header without a boundary, setdefault won't overwrite
    it, and the request goes out with no multipart boundary at all — violating the spec so no server
    can parse it; the boundary must be injected into the existing header.
  matched_finding: null
  note: 'NON-matchable: at review_sha the parser RAISES ValueError on a missing boundary rather than
    silently producing an unparseable request; the setdefault-mismatch + inject-boundary resolution
    (discussion_r906733887) came later'
  matchable: false
- ground_truth: g2
  issue: RFC 2046 allows the boundary parameter to be quoted; the parser must strip quotes (and handle
    mixed-case/whitespace) rather than only accepting the bare token form.
  matched_finding: 2
  note: 'PRESENT: `split(''boundary='')[-1].encode(''latin-1'')` does no quote/whitespace stripping
    (discussion_r945186942)'
  matchable: true
- ground_truth: g3
  issue: The boundary should be extracted from headers upstream in _models.py and passed down, removing
    the content_type parameter from encode_request/encode_multipart_data signatures entirely.
  matched_finding: 7
  note: 'PRESENT: content_type threaded through encode_request; reviewers wanted extraction moved
    to _models.py (discussion_r945184961)'
  matchable: true
finding_validity:
- finding: 0
  title: No test coverage for invalid (non-multipart) content-type header raising ValueError
  valid: true
  note: 'coverage gap: invalid content-type untested'
- finding: 1
  title: Boundary extraction using split('boundary=')[-1] is incorrect for values containing '='
    and is fragile
  valid: true
  note: 'g2: split incorrect for values containing ''='''
- finding: 2
  title: Boundary value not validated against RFC 2046 character set and not unquoted — enables MIME
    injection
  valid: true
  note: 'g2: boundary not validated/unquoted'
- finding: 3
  title: Header lookup and content-type prefix check are case-sensitive, causing silent failures
    for non-normalised inputs
  valid: true
  note: 'real: case-sensitive header/prefix check'
- finding: 4
  title: No test for `get_multipart_boundary_from_content_type` with a content-type string that has
    no semicolon
  valid: true
  note: 'coverage gap: content-type-without-boundary untested'
- finding: 5
  title: No test for precedence when both `boundary` kwarg and a content-type header are supplied
  valid: true
  note: 'coverage gap: boundary-kwarg vs header precedence untested'
- finding: 6
  title: New `headers` parameter in `encode_request` and combined `data`+`files` path lack unit-level
    test coverage
  valid: true
  note: 'coverage gap: headers param + data+files path untested'
- finding: 7
  title: Header validation logic placed in the wrong abstraction layer
  valid: true
  note: 'g3: boundary/content-type handling in the wrong abstraction layer'
- finding: 8
  title: Missing boundary in multipart/form-data content-type raises ValueError instead of falling
    back to auto-generation
  valid: uncertain
  note: raise-vs-inject behavior — review design debate
- finding: 9
  title: Explicit `boundary` parameter not exposed through `Request.__init__`, limiting the public
    API
  valid: uncertain
  note: boundary not exposed through Request.__init__ — design, mild
- finding: 10
  title: Truthy check on `headers` is inconsistent with the file's `is not None` style
  valid: true
  note: truthy check inconsistent with is-not-None style — factual
- finding: 11
  title: Missing docstring on new public function `get_multipart_boundary_from_content_type`
  valid: true
  note: missing docstring on the new public function — factual
- finding: 12
  title: Inconsistent parametrize and annotation style between existing and new tests
  valid: uncertain
  note: parametrize/annotation style — subjective
