case: httpx_1197
experiment: no-tools
ground_truth_matches:
- ground_truth: g1
  issue: The closed-check belongs as a plain inline guard at the top of send(), not as a decorator
    on request() — simpler, better tracebacks, and the right layer.
  matched_finding: null
  note: 'PRESENT: @check_not_closed decorates request()/send() (discussion_r472950631); the send()-bypass
    layering is the g1 insight'
  matchable: true
- ground_truth: g2
  issue: 'close() should be idempotent: calling it on an already-closed client should pass silently
    instead of erroring.'
  matched_finding: 1
  note: 'PRESENT: close()/aclose() decorated with check_not_closed raise on second call instead of
    passing silently (discussion_r472952614)'
  matchable: true
- ground_truth: g3
  issue: _is_closed = True should be set as the first statement of close(), not the last, to shrink
    the race window with concurrent sends.
  matched_finding: null
  note: 'NON-matchable: the _is_closed-first race-ordering concern (discussion_r472953172) applies
    to the inline close() that replaced the decorator; not present at this commit'
  matchable: false
- ground_truth: g4
  issue: 'The warning class choice matters for visibility: UserWarning vs ResourceWarning was debated
    (ResourceWarning is silenced by default; UserWarning pollutes the user''s namespace) — resolved
    to UserWarning.'
  matched_finding: null
  note: 'NON-matchable: the unclosed-client warning (UserWarning vs ResourceWarning, discussion_r474644263)
    was added in a later commit; no warnings.warn at review_sha'
  matchable: false
finding_validity:
- finding: 0
  title: '`check_not_closed` wrapper is not async-aware, wrapping async methods with a sync wrapper'
  valid: uncertain
  note: '''not async-aware'' — true observation, overstated impact (await path works)'
- finding: 1
  title: '`Client.close()` decorated with `@check_not_closed` prevents idempotent closing and double-close
    via `__exit__`'
  valid: true
  note: 'g2: Client.close() decorated → not idempotent'
- finding: 2
  title: '`AsyncClient.aclose()` decorated with `@check_not_closed` prevents idempotent closing and
    breaks `__aexit__`'
  valid: true
  note: aclose() likewise not idempotent — valid
- finding: 3
  title: Sync Client.close() guarded by check_not_closed but double-close is only tested, not first-close
    sets _is_closed=True path re-entry
  valid: true
  note: double-close only tested, guard not inline — valid observation
- finding: 4
  title: AsyncClient.__aexit__ calling aclose() after manual aclose() raises RuntimeError – uncovered
  valid: true
  note: 'real: __aexit__ calls aclose() after a manual aclose() → RuntimeError'
- finding: 5
  title: check_not_closed decorator not tested on async methods other than request/aclose
  valid: true
  note: 'coverage gap: decorator untested on other async methods'
- finding: 6
  title: '`@check_not_closed` on `close()` prevents idempotent close, creating a DoS vector in `__exit__`/`__aexit__`
    error paths'
  valid: uncertain
  note: idempotent-close 'DoS vector' framing is speculative
- finding: 7
  title: Overly verbose / inconsistent error message
  valid: uncertain
  note: error message verbose — subjective
- finding: 8
  title: Decorator `check_not_closed` does not support async callables
  valid: false
  note: '''does not support async callables'' is wrong — it returns the coroutine, await works'
- finding: 9
  title: is_closed property initial state (False) not explicitly tested
  valid: true
  note: 'coverage gap: is_closed initial state untested'
- finding: 10
  title: Error message in RuntimeError may leak internal object repr
  valid: uncertain
  note: repr-in-error leak speculative
- finding: 11
  title: test_that_client_cannot_send_request_after_being_closed uses get() not send() directly
  valid: uncertain
  note: test uses get() not send() — minor
- finding: 12
  title: check_not_closed decorator not tested with proxies set up
  valid: uncertain
  note: decorator untested with proxies — marginal
- finding: 13
