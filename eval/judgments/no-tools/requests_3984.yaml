- ground_truth: g1
  issue: If the body ends with a CRLF split at a chunk boundary, the chunk becomes empty after stripping,
    splitlines() returns [], and lines[-1] raises IndexError.
  matched_finding: null
  note: 'NON-matchable: the empty-chunk `if not chunk: continue` guard is present at review_sha;
    no IndexError (discussion_r112750569) — and no experiment falsely flags one here'
  matchable: false
- ground_truth: g2
  issue: Chunks like ['...\r', '\n', '\nmore'] strip two newline characters instead of emitting the
    empty line — the CR flag must be reset after consuming one LF.
  matched_finding: 0
  note: 'PRESENT: the last_chunk_ends_with_cr flag-reset logic (discussion_r112929801) is under review
    here; all three experiments flag it'
  matchable: true
- ground_truth: g3
  issue: New tests use unprefixed string literals that are intended to be unicode; they must carry
    the u'' prefix to pass on Python 2.
  matched_finding: null
  note: 'NON-matchable: the py2 u'''' -prefix test-literal concern (discussion_r112804923) is a py2
    detail; the tests already carry prefixes here'
  matchable: false
- ground_truth: g4
  issue: The chunk/flag handling should be restructured for readability (named condition variables,
    single assignment site) rather than the doubled-up inline conditions.
  matched_finding: null
  note: 'NON-matchable: named condition variables (carriage_return/line_feed) already exist at review_sha,
    satisfying the readability ask (discussion_r113172022)'
  matchable: false
