- ground_truth: g1
  issue: The brute-force test making 100 HTTP requests is aggressive and not reliably failing; a
    deterministic test coordinating threads with threading.Event and no network would be better.
  matched_finding: null
  note: 'PRESENT: the 100-request ThreadPool brute-force test is at review_sha; Lukasa flagged it
    ''overly aggressive'', suggested threading.Event (discussion_r27737727)'
  matchable: true
- ground_truth: g2
  issue: The thread-local attribute should be private (underscore-prefixed) and clearly named (e.g.
    _thread_local) so readers understand it without reading the whole class.
  matched_finding: 4
  note: 'PRESENT: thread-local stored as `self.tl` (opaque, not private _thread_local); sigmavirus24
    asked for clearer naming (discussion_r27754250)'
  matchable: true
- ground_truth: g3
  issue: The getattr fallback for num_401_calls is dead weight after the refactor — the value is
    always assigned in __call__, so the default branch can never trigger and should be removed.
  matched_finding: null
  note: 'NON-matchable: no getattr fallback at review_sha — handle_401 reads `self.tl.num_401_calls`
    directly; the dead getattr (discussion_r27659035) was already removed'
  matchable: false
