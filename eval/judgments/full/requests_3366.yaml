case: requests_3366
experiment: full
ground_truth_matches:
- ground_truth: g1
  issue: 'Header validation must handle both unicode and byte-string headers: matching a native-string
    regex against an opaque bytestring misbehaves on Python 3, so separate byte and str regexes are
    required.'
  matched_finding: null
  note: 'PRESENT: a single native-string regex is applied to header values (byte/None handling problems
    surface per findings); the separate byte/str regexes (discussion_r69270130) aren''t there — unmatched'
  matchable: true
- ground_truth: g2
  issue: The compiled regexes are created inside the function, losing the benefit of re.compile;
    they should be hoisted to module scope with underscore-prefixed names.
  matched_finding: 4
  note: 'PRESENT: the validation regex is compiled inside prepare_headers on every call (discussion_r69313226)'
  matchable: true
- ground_truth: g3
  issue: Using the validity check as a filter() predicate misrepresents what it does (nothing is
    filtered); rename to check_header_validity and call it in the single loop that sets headers.
  matched_finding: null
  note: 'NON-matchable: this commit is literally ''moving logic up to prepare_headers'' — the filter()->single-loop
    fix (discussion_r69365861) is being applied here'
  matchable: false
- ground_truth: g4
  issue: 'The byte-string regex is missing an escaped backslash: ''\S'' in a plain (non-raw) byte
    string needs to be ''\\S'' to mean the regex class.'
  matched_finding: null
  note: 'NON-matchable: no separate byte regex at review_sha, so the missing-escaped-backslash bug
    (discussion_r69381140) doesn''t exist yet'
  matchable: false
finding_validity:
