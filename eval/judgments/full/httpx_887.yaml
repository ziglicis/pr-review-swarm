case: httpx_887
experiment: full
ground_truth_matches:
- ground_truth: g1
  issue: The helper's "get chunk" naming misrepresents what it does — it returns a modified body
    iterable that skips leading empty chunks, so it should be named accordingly (e.g. _skip_leading_empty_chunks).
  matched_finding: 4
  note: 'PRESENT: helper named `_get_non_empty_chunk` (misleading — returns a modified body iterable);
    florimondmanca flagged the name at review_sha (discussion_r399778004)'
  matchable: true
- ground_truth: g2
  issue: PEP 3333 permits sending headers early when Content-Length is 0 — reviewers debated whether
    that exception needs explicit handling and settled on pragmatically skipping it.
  matched_finding: null
  note: 'NON-matchable: the PEP 3333 Content-Length-0 early-header edge (discussion_r399773077) was
    debated and resolved as pragmatically skipped — not a defect'
  matchable: false
- ground_truth: g3
  issue: New tests duplicate what tests/test_wsgi.py already covers; the existing echo_body_with_response_stream
    fixture should be refactored into a true generator instead of adding parallel tests elsewhere.
  matched_finding: 12
  note: 'PRESENT: new tests redundantly assert both text and content; florimondmanca raised it at
    review_sha (discussion_r399710687)'
  matchable: true
finding_validity:
- finding: 0
  title: Generator apps that call start_response after first yield may trigger AssertionError
  valid: uncertain
  note: generator start_response-after-yield AssertionError — real edge, overstated (the helper iterates
    the body first)
- finding: 1
  title: close() not called on original WSGI result iterator (PEP 3333 violation)
  valid: true
  note: close() not called on the WSGI result iterator — real PEP 3333 gap
- finding: 2
  title: Exceptions raised inside a WSGI generator bypass the raise_app_exceptions guard
  valid: uncertain
  note: exceptions in a WSGI generator bypassing raise_app_exceptions — plausible edge
- finding: 3
  title: HTTP header injection via unsanitised request header names written into environ
  valid: false
  note: env header construction is pre-existing and caller-controlled; no injection introduced by
    this PR
- finding: 4
  title: 'Misleading function name: _get_non_empty_chunk does not return a single chunk'
  valid: true
  note: 'g1: misleading function name _get_non_empty_chunk'
- finding: 5
  title: Unbounded iteration over empty chunks enables denial-of-service
  valid: false
  note: an infinite all-empty body hangs regardless; no new DoS
- finding: 6
  title: application_factory name does not communicate what the application does
  valid: uncertain
  note: application_factory naming — subjective
- finding: 7
  title: Missing tests for list-based iterables with empty chunks and for truly empty iterables
  valid: true
  note: 'coverage gap: list-based empty chunks + truly empty iterable untested'
- finding: 8
  title: Header propagation after _get_non_empty_chunk is only implicitly covered
  valid: uncertain
  note: header propagation only implicitly covered — mild
- finding: 9
  title: 'Overly broad type annotation: Iterable should be Iterable[bytes]'
  valid: true
  note: Iterable should be Iterable[bytes] — factual
- finding: 10
  title: Docstring is too terse and partially inaccurate
  valid: true
  note: docstring 'Get a non-empty chunk' is inaccurate — factual
- finding: 11
  title: Inline comment uses 'served' where 'yielded' or 'returned' is more precise
  valid: uncertain
  note: comment 'served' vs 'yielded' — subjective
- finding: 12
  title: 'Redundant assertion: response.text and response.content check the same payload'
  valid: true
  note: 'g3: redundant text+content assertion'
