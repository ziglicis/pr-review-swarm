  valid: true
  note: 'g3 coverage: LineDecoder edge cases untested'
- finding: 2
  title: Module-level constant NEWLINE_CHARS defined inside method body
  valid: uncertain
  note: NEWLINE_CHARS placement is factual but it's a compile-time constant — no real per-call cost
- finding: 3
  title: Misleading comment on trailing \r re-buffering logic
  valid: uncertain
  note: '''misleading comment'' — subjective'
- finding: 4
  title: Class docstring incorrectly claims normalization to \n after behavior change in flush()
  valid: true
  note: 'g1: docstring claims normalization to \n after the behavior change'
- finding: 5
  title: 'Typo: ''seperator'' should be ''separator'''
  valid: true
