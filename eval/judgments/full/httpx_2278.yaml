case: httpx_2278
experiment: full
ground_truth_matches:
- ground_truth: g1
  issue: When the user supplies a Content-Type header without a boundary, setdefault won't overwrite
    it, and the request goes out with no multipart boundary at all — violating the spec so no server
    can parse it; the boundary must be injected into the existing header.
  matched_finding: null
  note: 'NON-matchable: at review_sha the parser RAISES ValueError on a missing boundary rather than
    silently producing an unparseable request; the setdefault-mismatch + inject-boundary resolution
    (discussion_r906733887) came later'
  matchable: false
- ground_truth: g2
  issue: RFC 2046 allows the boundary parameter to be quoted; the parser must strip quotes (and handle
    mixed-case/whitespace) rather than only accepting the bare token form.
  matched_finding: 1
  note: 'PRESENT: `split(''boundary='')[-1].encode(''latin-1'')` does no quote/whitespace stripping
    (discussion_r945186942)'
  matchable: true
- ground_truth: g3
  issue: The boundary should be extracted from headers upstream in _models.py and passed down, removing
    the content_type parameter from encode_request/encode_multipart_data signatures entirely.
  matched_finding: null
  note: 'PRESENT: content_type threaded through encode_request; reviewers wanted extraction moved
    to _models.py (discussion_r945184961)'
  matchable: true
finding_validity:
- finding: 0
  title: Invalid content-type header path is untested
  valid: true
  note: 'coverage gap: invalid content-type path untested'
- finding: 1
  title: Boundary extraction does not strip trailing whitespace/garbage, causing declared and wire
    boundary to diverge
  valid: true
  note: 'g2: no whitespace stripping on the extracted boundary'
- finding: 2
  title: Unvalidated boundary value enables CRLF/header injection
  valid: uncertain
  note: CRLF-injection via boundary — caller-controlled value, no trust boundary
- finding: 3
  title: Case-sensitive header lookup and over-broad `startswith` check on Content-Type
  valid: true
  note: 'real: case-sensitive startswith on the Content-Type value'
- finding: 4
  title: Boundary value extracted with `split('boundary=')[-1]` is incorrect for boundary values
    containing the substring 'boundary='
  valid: true
  note: 'real: split(''boundary='')[-1] is fragile for boundaries containing ''='''
- finding: 5
  title: Redundant outer `if ";" in content_type` guard before `split`
  valid: true
  note: redundant outer if ';' guard — the split loop already handles it
- finding: 6
  title: No test for explicit `boundary` argument taking precedence over a `Content-Type` header
  valid: true
  note: 'coverage gap: explicit boundary precedence untested'
- finding: 7
  title: '`get_multipart_boundary_from_content_type`: no-semicolon code path not unit-tested'
  valid: true
  note: 'coverage gap: no-semicolon path untested'
- finding: 8
  title: New `headers` parameter in `encode_request` / `Request` constructor not tested at unit level
  valid: true
  note: 'coverage gap: new headers param untested'
- finding: 9
  title: Truthy check on `headers` should use `is not None`
  valid: true
  note: truthy headers check should be is not None — factual
- finding: 10
  title: Variable name `new_headers` is a workaround, not a meaningful name
  valid: uncertain
  note: new_headers naming — subjective
- finding: 11
  title: Dropped `boundary` keyword argument at `encode_request` call site may cause future confusion
  valid: uncertain
  note: dropped boundary kwarg 'may cause future bug' — speculative
- finding: 12
  title: Inconsistent `parametrize` style across new and existing tests
  valid: uncertain
  note: parametrize style — subjective
