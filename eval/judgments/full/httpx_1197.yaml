case: httpx_1197
experiment: full
ground_truth_matches:
- ground_truth: g1
  issue: The closed-check belongs as a plain inline guard at the top of send(), not as a decorator
    on request() — simpler, better tracebacks, and the right layer.
  matched_finding: 4
  note: 'PRESENT: @check_not_closed decorates request()/send() (discussion_r472950631); the send()-bypass
    layering is the g1 insight'
  matchable: true
- ground_truth: g2
  issue: 'close() should be idempotent: calling it on an already-closed client should pass silently
    instead of erroring.'
  matched_finding: 0
  note: 'PRESENT: close()/aclose() decorated with check_not_closed raise on second call instead of
    passing silently (discussion_r472952614)'
  matchable: true
- ground_truth: g3
  issue: _is_closed = True should be set as the first statement of close(), not the last, to shrink
    the race window with concurrent sends.
  matched_finding: null
  note: 'NON-matchable: the _is_closed-first race-ordering concern (discussion_r472953172) applies
    to the inline close() that replaced the decorator; not present at this commit'
  matchable: false
- ground_truth: g4
  issue: 'The warning class choice matters for visibility: UserWarning vs ResourceWarning was debated
    (ResourceWarning is silenced by default; UserWarning pollutes the user''s namespace) — resolved
    to UserWarning.'
  matched_finding: null
  note: 'NON-matchable: the unclosed-client warning (UserWarning vs ResourceWarning, discussion_r474644263)
    was added in a later commit; no warnings.warn at review_sha'
  matchable: false
finding_validity:
- finding: 0
  title: Decorating close()/aclose() with @check_not_closed breaks idempotency and can shadow exceptions
    in __exit__/__aexit__
  valid: true
  note: 'g2: decorating close()/aclose() breaks idempotency'
- finding: 1
  title: 'check_not_closed decorator is not async-aware: wraps async methods with a sync wrapper'
  valid: uncertain
  note: '''not async-aware'' is a true observation (sync wrapper) but the wrapper returns the coroutine,
    so await works — impact overstated'
- finding: 2
  title: Error message is informal and embeds full object repr, potentially exposing sensitive configuration
  valid: uncertain
  note: repr-in-error-message leak is speculative
- finding: 3
  title: 'Missing tests: requests are not verified to raise RuntimeError after context-manager exit'
  valid: true
  note: 'coverage gap: no test that requests raise after ctx-manager close'
- finding: 4
  title: send() and other entry-points bypassing request() are not guarded or tested for post-close
    behavior
  valid: true
  note: 'g1: send() bypasses the request()-level guard — the wrong-layer insight'
- finding: 5
  title: 'Docstring grammar: missing word — "Check if the client being closed"'
  valid: true
  note: docstring grammar 'being closed' confirmed
- finding: 6
  title: New test names use verbose test_that_ prefix inconsistent with existing test naming style
  valid: uncertain
  note: test_that_ naming — subjective
- finding: 7
  title: New async test names use verbose test_that_ prefix inconsistent with existing test naming
    style
  valid: uncertain
  note: async test naming — subjective
- finding: 8
  title: No test asserting is_closed is False for a freshly created client
  valid: true
  note: 'factual coverage gap: is_closed False on fresh client untested'
- finding: 9
  title: Decorator name check_not_closed could more clearly convey that it enforces a precondition
  valid: uncertain
  note: decorator naming — subjective
