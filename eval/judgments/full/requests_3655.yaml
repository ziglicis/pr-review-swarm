case: requests_3655
experiment: full
ground_truth_matches:
- ground_truth: g1
  issue: When tell() fails at prepare time, _body_position stays None and rewind_body silently skips
    instead of raising; a sentinel object is needed to distinguish "never set" from "tell failed".
  matched_finding: null
  note: 'NON-matchable: the object() sentinel for failed tell() is already present at review_sha
    (findings reference it), addressing discussion_r85648021'
  matchable: false
- ground_truth: g2
  issue: Casting tell()'s result with int() is wrong on Python 2 where long (bignum) is meaningful;
    an integer_types tuple belongs in compat.py — and the first attempt wrote (int) which isn't a
    tuple at all.
  matched_finding: null
  note: 'PRESENT: rewind_body uses `isinstance(_body_position, int)` — misses py2 long; Lukasa flagged
    it (discussion_r85892421); unmatched'
  matchable: true
- ground_truth: g3
  issue: The new exception name RedirectError is too vague for what it signals; it should be the
    specific UnrewindableBodyError.
  matched_finding: null
  note: 'NON-matchable: the exception is already named UnrewindableBodyError at review_sha, not RedirectError
    (discussion_r85712220)'
  matchable: false
- ground_truth: g4
  issue: Tests must assert the actual content re-read after rewind and cover an object with seek()
    but a broken/missing tell().
  matched_finding: 0
  note: 'PRESENT: tests don''t cover the seek-but-broken-tell path / re-read content (discussion_r85716594)'
  matchable: true
- ground_truth: g5
  issue: The rewind helper doesn't use self — it's a function masquerading as a method and belongs
    in utils.
  matched_finding: null
  note: 'PRESENT: rewind_body is a method with unused self; Lukasa: ''self is unused in this method''
    (discussion_r85892494); unmatched'
  matchable: true
finding_validity:
