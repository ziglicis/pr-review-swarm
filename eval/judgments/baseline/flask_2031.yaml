case: flask_2031
experiment: baseline
ground_truth_matches:
- ground_truth: g1
  issue: File handles must be closed on the error/exception paths (e.g. RequestedRangeNotSatisfiable)
    regardless of whether send_file opened the file or received it — the initial patch leaked the
    handle in some cases.
  matched_finding: 1
  note: 'PRESENT at review_sha: 416 handler file.close() on error paths; reviewer flagged the leak
    (discussion_r80032416)'
  matchable: true
- ground_truth: g2
  issue: Feature detection for werkzeug range support is too broad; it should be a werkzeug version
    check or an existence check of the specific function, not a blanket try/except.
  matched_finding: 0
  note: 'PRESENT: range support detected via broad `try/except TypeError` around make_conditional
    (discussion_r80204974)'
  matchable: true
