case: httpx_3139
experiment: baseline
ground_truth_matches:
- ground_truth: g1
  issue: Decompressed chunks should be assembled with io.BytesIO rather than repeated bytes concatenation.
  matched_finding: null
  note: fixed during review — decode() already assembles chunks with io.BytesIO at the reviewed head
    (discussion_r1518812137)
  matchable: false
- ground_truth: g2
  issue: The runtime zstandard version guard in _compat.py is questioned as overly defensive vs pinning
    >=0.18 in requirements; kept because the extra is optional and an old zstandard may already be
    installed — a genuine design disagreement documented in review.
  matched_finding: null
  note: design debate resolved by keeping the guard (documented in review); no finding raises the
    version-guard-vs-requirements-pin question (discussion_r1524997549); finding 7 questions only
    the exception breadth
  matchable: false
- ground_truth: g3
  issue: Test coverage for the new decoder paths is incomplete and needs addressing before merge.
  matched_finding: 3
  note: 'finding 3 is the sharpest coverage gap: the parametrized empty-content/decode tests exclude
    zstd — adding it would have exposed the empty-body flush bug'
  matchable: true
finding_validity:
- finding: 0
  title: '`ZStandardDecoder.decode` can silently drop data when a skippable frame is the *last* frame'
  valid: false
  note: 'verified: no data is dropped — skippable frames carry no payload and the loop output is
    correct; the speculated consequence does not occur'
- finding: 1
  title: '`ZStandardDecoder.flush` incorrectly rejects valid streams that end with a skippable frame'
  valid: false
  note: 'verified with zstandard: a trailing skippable frame leaves eof True and empty unused_data
    after the loop — flush() does not raise'
- finding: 2
  title: Truncated / placeholder error message in `ZStandardDecoder.__init__`
  valid: true
  note: verified placeholder text at the SHA
- finding: 3
  title: '`test_empty_content` and `test_decoders_empty_cases` parametrizations do not include `zstd`'
  valid: true
  note: factual, and adding zstd to those parametrizations would expose the real empty-body flush
    bug
- finding: 4
  title: '`zstd` missing from `__all__`'
  valid: true
  note: verified __all__ omission
- finding: 5
  title: '`ZStandardDecoder.flush` returns `bytes(ret)` where `ret` is already `bytes`'
  valid: uncertain
  note: copied verbatim from urllib3; possibly defensive typing rather than pure redundancy
- finding: 6
  title: '`test_decoding_errors` parametrization does not include `zstd`'
  valid: true
  note: 'factual: test_decoding_errors excludes zstd'
- finding: 7
  title: Catching `AttributeError` and `ValueError` on `import zstandard` is over-broad
  valid: uncertain
  note: package __init__ code can raise those exceptions (why urllib3 catches them); the defensiveness
    is deliberate and marked
- finding: 8
  title: '`test_zstd_decoding_error` passes a `str` as `content`, not invalid zstd bytes'
  valid: uncertain
  note: str content is accepted API and reaches the decoder; consistency point defensible
- finding: 9
  title: CHANGELOG `## Added` section is missing `###` prefix
  valid: true
  note: confirmed heading-level break
- finding: 10
  title: Redundant `assert zstd is not None` in `decode`
  valid: false
  note: it is a mypy type-narrowing assert for Optional[ModuleType] — removing it breaks the type
    check
