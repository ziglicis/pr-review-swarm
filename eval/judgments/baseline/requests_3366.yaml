case: requests_3366
experiment: baseline
ground_truth_matches:
- ground_truth: g1
  issue: 'Header validation must handle both unicode and byte-string headers: matching a native-string
    regex against an opaque bytestring misbehaves on Python 3, so separate byte and str regexes are
    required.'
  matched_finding: null
  note: 'PRESENT: a single native-string regex is applied to header values (byte/None handling problems
    surface per findings); the separate byte/str regexes (discussion_r69270130) aren''t there — unmatched'
  matchable: true
- ground_truth: g2
  issue: The compiled regexes are created inside the function, losing the benefit of re.compile;
    they should be hoisted to module scope with underscore-prefixed names.
  matched_finding: 1
  note: 'PRESENT: the validation regex is compiled inside prepare_headers on every call (discussion_r69313226)'
  matchable: true
- ground_truth: g3
  issue: Using the validity check as a filter() predicate misrepresents what it does (nothing is
    filtered); rename to check_header_validity and call it in the single loop that sets headers.
  matched_finding: null
  note: 'NON-matchable: this commit is literally ''moving logic up to prepare_headers'' — the filter()->single-loop
    fix (discussion_r69365861) is being applied here'
  matchable: false
- ground_truth: g4
  issue: 'The byte-string regex is missing an escaped backslash: ''\S'' in a plain (non-raw) byte
    string needs to be ''\\S'' to mean the regex class.'
  matched_finding: null
  note: 'NON-matchable: no separate byte regex at review_sha, so the missing-escaped-backslash bug
    (discussion_r69381140) doesn''t exist yet'
  matchable: false
finding_validity:
- finding: 0
  title: Header *name* is never validated — only the value is checked
  valid: true
  note: header name never validated — real
- finding: 1
  title: Regex compiled on every `prepare_headers` call — should be a module-level constant
  valid: true
  note: 'g2: regex compiled every call'
- finding: 2
  title: Trailing newline bypasses `$` anchor — use `\Z` instead
  valid: true
  note: trailing newline bypasses $ — use \Z
- finding: 3
  title: '`None` header values cause an unhelpful `TypeError` instead of silent removal'
  valid: true
  note: None header values → unhelpful TypeError
- finding: 4
  title: '`InvalidHeader` not re-exported from the top-level `requests` package'
  valid: true
  note: InvalidHeader not re-exported from top-level requests — factual
- finding: 5
  title: '''Tab'' test case contains spaces, not a tab character'
  valid: true
  note: tab test uses spaces — factual
- finding: 6
  title: Header validation tests unnecessarily depend on live `httpbin` fixture
  valid: true
  note: tests unnecessarily depend on live httpbin — validation is pure
- finding: 7
  title: Missing blank line between `InvalidURL` and `InvalidHeader` class definitions
  valid: true
  note: missing blank line between exception classes — factual
- finding: 8
  title: Missing space after comma in function signature
  valid: true
