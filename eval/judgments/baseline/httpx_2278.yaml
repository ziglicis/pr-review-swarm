case: httpx_2278
experiment: baseline
ground_truth_matches:
- ground_truth: g1
  issue: When the user supplies a Content-Type header without a boundary, setdefault won't overwrite
    it, and the request goes out with no multipart boundary at all — violating the spec so no server
    can parse it; the boundary must be injected into the existing header.
  matched_finding: null
  note: 'NON-matchable: at review_sha the parser RAISES ValueError on a missing boundary rather than
    silently producing an unparseable request; the setdefault-mismatch + inject-boundary resolution
    (discussion_r906733887) came later'
  matchable: false
- ground_truth: g2
  issue: RFC 2046 allows the boundary parameter to be quoted; the parser must strip quotes (and handle
    mixed-case/whitespace) rather than only accepting the bare token form.
  matched_finding: 0
  note: 'PRESENT: `split(''boundary='')[-1].encode(''latin-1'')` does no quote/whitespace stripping
    (discussion_r945186942)'
  matchable: true
- ground_truth: g3
  issue: The boundary should be extracted from headers upstream in _models.py and passed down, removing
    the content_type parameter from encode_request/encode_multipart_data signatures entirely.
  matched_finding: null
  note: 'PRESENT: content_type threaded through encode_request; reviewers wanted extraction moved
    to _models.py (discussion_r945184961)'
  matchable: true
finding_validity:
- finding: 0
  title: Boundary value parsed with `split('boundary=')[-1]` can include trailing junk
  valid: true
  note: 'g2: split(''boundary='')[-1] can include trailing junk'
- finding: 1
  title: Header lookup uses hardcoded lowercase key but `Headers` object is case-insensitive
  valid: uncertain
  note: conflates key lookup (fine, Headers is case-insensitive) with the real value-check issue
- finding: 2
  title: Content-Type validation runs even when `content-type` header is not `multipart/form-data`
    — missing validation for uppercase headers key
  valid: uncertain
  note: validation runs for non-multipart — mild
- finding: 3
  title: Content-Type header supplied by user is overwritten by `_prepare` in the non-boundary case
  valid: uncertain
  note: '''user content-type overwritten'' — at review_sha it raises, so this is imprecise'
- finding: 4
  title: Missing test for invalid content-type (non-multipart) when files are provided
  valid: true
  note: 'coverage gap: invalid content-type untested'
- finding: 5
  title: '`split(''boundary='')[-1]` is fragile — should use `split(''='', 1)[1]` or partition'
  valid: true
  note: 'g2: split fragile, should use split(''='',1)'
- finding: 6
  title: Non-multipart `content-type` header raises ValueError instead of being silently ignored
  valid: uncertain
  note: raise-vs-silent behavior — a review design debate
- finding: 7
  title: Test case `"multipart/form-data; boundary=+++ ;"` likely tests wrong expected boundary
  valid: uncertain
  note: '''boundary=+++ ;'' expected-value claim — speculative'
- finding: 8
  title: '`MultipartStream.content_type` uses raw boundary bytes decoded as ASCII — may fail for
    non-ASCII boundaries'
  valid: uncertain
  note: content_type ASCII-decode edge — mild
