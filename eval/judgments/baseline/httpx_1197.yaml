case: httpx_1197
experiment: baseline
ground_truth_matches:
- ground_truth: g1
  issue: The closed-check belongs as a plain inline guard at the top of send(), not as a decorator
    on request() — simpler, better tracebacks, and the right layer.
  matched_finding: null
  note: 'PRESENT: @check_not_closed decorates request()/send() (discussion_r472950631); the send()-bypass
    layering is the g1 insight'
  matchable: true
- ground_truth: g2
  issue: 'close() should be idempotent: calling it on an already-closed client should pass silently
    instead of erroring.'
  matched_finding: 1
  note: 'PRESENT: close()/aclose() decorated with check_not_closed raise on second call instead of
    passing silently (discussion_r472952614)'
  matchable: true
- ground_truth: g3
  issue: _is_closed = True should be set as the first statement of close(), not the last, to shrink
    the race window with concurrent sends.
  matched_finding: null
  note: 'NON-matchable: the _is_closed-first race-ordering concern (discussion_r472953172) applies
    to the inline close() that replaced the decorator; not present at this commit'
  matchable: false
- ground_truth: g4
  issue: 'The warning class choice matters for visibility: UserWarning vs ResourceWarning was debated
    (ResourceWarning is silenced by default; UserWarning pollutes the user''s namespace) — resolved
    to UserWarning.'
  matched_finding: null
  note: 'NON-matchable: the unclosed-client warning (UserWarning vs ResourceWarning, discussion_r474644263)
    was added in a later commit; no warnings.warn at review_sha'
  matchable: false
finding_validity:
- finding: 0
  title: '`check_not_closed` wrapper is sync-only: `async` methods wrapped by it never actually execute'
  valid: false
  note: 'claim that async methods ''never actually execute'' is wrong: the sync wrapper returns the
    coroutine and await works'
- finding: 1
  title: Calling `close()` on an already-closed `Client` raises `RuntimeError` instead of being idempotent
  valid: true
  note: 'g2: close() on an already-closed client raises RuntimeError instead of passing silently'
- finding: 2
  title: Test for double-close of `AsyncClient` passes for the wrong reason (async wrapper bug)
  valid: uncertain
  note: '''test passes for the wrong reason'' hinges on the async-bug claim, which is overstated'
- finding: 3
  title: Error message wording is awkward
  valid: uncertain
  note: error-message wording — subjective
- finding: 4
  title: Test `test_that_client_cannot_send_request_after_being_closed` uses a real network address
    without mocking
  valid: uncertain
  note: test uses a network address — minor, httpx tests use example.com by convention
- finding: 5
  title: 'Docstring grammar: "Check if the client being closed"'
  valid: true
  note: docstring grammar confirmed
