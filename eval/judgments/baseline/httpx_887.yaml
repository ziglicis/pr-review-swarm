case: httpx_887
experiment: baseline
ground_truth_matches:
- ground_truth: g1
  issue: The helper's "get chunk" naming misrepresents what it does — it returns a modified body
    iterable that skips leading empty chunks, so it should be named accordingly (e.g. _skip_leading_empty_chunks).
  matched_finding: null
  note: 'PRESENT: helper named `_get_non_empty_chunk` (misleading — returns a modified body iterable);
    florimondmanca flagged the name at review_sha (discussion_r399778004)'
  matchable: true
- ground_truth: g2
  issue: PEP 3333 permits sending headers early when Content-Length is 0 — reviewers debated whether
    that exception needs explicit handling and settled on pragmatically skipping it.
  matched_finding: null
  note: 'NON-matchable: the PEP 3333 Content-Length-0 early-header edge (discussion_r399773077) was
    debated and resolved as pragmatically skipped — not a defect'
  matchable: false
- ground_truth: g3
  issue: New tests duplicate what tests/test_wsgi.py already covers; the existing echo_body_with_response_stream
    fixture should be refactored into a true generator instead of adding parallel tests elsewhere.
  matched_finding: null
  note: 'PRESENT: new tests redundantly assert both text and content; florimondmanca raised it at
    review_sha (discussion_r399710687)'
  matchable: true
finding_validity:
- finding: 0
  title: '`_get_non_empty_chunk` eagerly consumes the iterator before `start_response` is called
    for generator-based apps'
  valid: uncertain
  note: '''eagerly consumes iterator'' describes intended behavior; overstated'
- finding: 1
  title: '`assert seen_status is not None` fires before generator body executes'
  valid: false
  note: 'assert does not fire before the body: _get_non_empty_chunk iterates the generator (running
    start_response) first'
- finding: 2
  title: WSGI `close()` method not called on the application's iterable
  valid: true
  note: close() not called on the app iterable — real PEP 3333 gap
- finding: 3
  title: Docstring for `_get_non_empty_chunk` is not descriptive enough
  valid: true
  note: docstring not descriptive — factual (but not the misleading-name point)
- finding: 4
  title: '`application_factory` yields from `output` — testing with a generator, not a list return'
  valid: uncertain
  note: application_factory is a generator not a list — observation
- finding: 5
  title: 'Empty-body generator test: `start_response` may not be called if generator is exhausted
    in `_get_non_empty_chunk` without running app body'
  valid: uncertain
  note: empty-body generator start_response edge — the debated g2 territory
- finding: 6
  title: Redundant generator expression wrapping `result`
  valid: true
  note: redundant generator expression wrapping result — factual
